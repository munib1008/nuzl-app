name: nuzl_app
description: NUZL.AE — opportunity-first real-estate operating platform (Flutter, mobile + web).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.5.1          # state management
  go_router: ^14.2.0                # routing (web URLs + deep links)
  dio: ^5.4.3                        # HTTP client with interceptors
  flutter_secure_storage: ^9.2.2     # JWT storage (mobile + web)
  google_fonts: ^6.2.1               # Inter / Noto Sans Arabic
  intl: ^0.19.0                      # number/date formatting

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
