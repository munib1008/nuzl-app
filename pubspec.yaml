name: nuzl_app
description: NUZL.AE — opportunity-first real-estate operating platform (Flutter, mobile + web).
publish_to: "none"
version: 1.8.0+11

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  dio: ^5.4.3
  flutter_secure_storage: ^9.2.2
  google_fonts: ^6.2.1
  intl: ^0.19.0
  flutter_svg: ^2.0.10
  image_picker: ^1.1.2
  file_picker: ^8.1.0
  excel: ^4.0.6
  google_sign_in: ^6.2.1
  figma_squircle: ^0.6.3
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/logo/nuzl_mark.svg
    - assets/icon/nuzl_icon.png

flutter_launcher_icons:
  image_path: "assets/icon/nuzl_icon.png"
  android: false # no native android/ folder (web-only build); flip to true after `flutter create`
  ios: false
  remove_alpha_ios: true
  web:
    generate: true
    background_color: "#172B36"
    theme_color: "#172B36"
